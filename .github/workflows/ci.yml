name: Aletheia CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aletheia
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Ruff
        run: ruff check backend

      - name: Run isort
        run: isort --check backend

      - name: Run Black
        run: black --check backend

      - name: Run Tests
        env:
          POSTGRES_DSN: postgresql://user:password@localhost:5432/aletheia
        run: pytest
